<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#17171a" />
<title>Voice Harness</title>
<style>
  :root {
    --bg:#17171a; --panel:#202024; --text:#ececf1; --muted:#9a9aa6;
    --border:#2e2e35; --border-strong:#3a3a42; --accent:#818cf8; --accent-fg:#17171a;
    --ok:#4ade80; --warn:#fbbf24; --err:#f87171;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; font-size:16px;
    padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 16px); }
  header { display:flex; align-items:center; gap:10px; padding:14px 0; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  .spacer { flex:1; }
  .pill { font-size:12px; color:var(--muted); border:1px solid var(--border-strong);
    border-radius:999px; padding:3px 10px; }
  .pill.busy { color:var(--warn); border-color:var(--warn); }
  .pill.ready { color:var(--ok); border-color:var(--ok); }
  select, input, button { font:inherit; color:var(--text); }
  select, input { width:100%; background:var(--panel); border:1px solid var(--border-strong);
    border-radius:10px; padding:12px; margin:6px 0; }
  label { font-size:13px; color:var(--muted); }
  .mic { width:100%; height:120px; border-radius:16px; border:1px solid var(--border-strong);
    background:var(--panel); color:var(--text); font-size:18px; font-weight:600; margin:14px 0;
    display:flex; align-items:center; justify-content:center; gap:10px; }
  .mic.rec { background:color-mix(in srgb,var(--err) 22%,var(--panel)); border-color:var(--err);
    animation:pulse 1.1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
  .row { display:flex; gap:8px; }
  .row button { flex:0 0 auto; background:var(--accent); color:var(--accent-fg);
    border:none; border-radius:10px; padding:0 18px; font-weight:600; }
  .row input { margin:0; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:14px; margin-top:14px; }
  .muted { color:var(--muted); font-size:13px; }
  .k { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  #summary { white-space:pre-wrap; margin-top:4px; }
  #transcript { font-style:italic; color:var(--muted); }
  .replay { margin-top:10px; background:var(--panel); border:1px solid var(--border-strong);
    color:var(--text); border-radius:10px; padding:8px 14px; }
  .banner { background:color-mix(in srgb,var(--warn) 18%,var(--panel)); border:1px solid var(--warn);
    border-radius:10px; padding:10px; font-size:13px; margin-top:10px; }
  a { color:var(--accent); }
</style>
</head>
<body>
  <header>
    <h1>Voice Harness</h1>
    <span class="spacer"></span>
    <span id="state" class="pill">idle</span>
  </header>

  <label for="sessions">Session</label>
  <div class="row">
    <select id="sessions"></select>
    <button id="refresh" title="Refresh">↻</button>
  </div>

  <button id="mic" class="mic">🎙️ Tap to talk</button>

  <div class="row">
    <input id="text" placeholder="…or type a command" enterkeyhint="send" />
    <button id="send">Send</button>
  </div>

  <div id="secWarn" class="banner" hidden>
    Voice needs a secure (HTTPS) connection. Open this page via
    <code>tailscale serve</code> HTTPS. Typed commands work either way.
  </div>

  <div class="card" id="result" hidden>
    <div class="k">You said</div>
    <div id="transcript"></div>
    <div class="k" style="margin-top:10px">Claude</div>
    <div id="summary"></div>
    <button id="replay" class="replay" hidden>▶ Replay</button>
  </div>

  <div id="err" class="banner" hidden style="border-color:var(--err);background:color-mix(in srgb,var(--err) 15%,var(--panel))"></div>

<script>
(function () {
  const base = location.origin;
  // token from #t=... (one-time), then localStorage
  const hash = new URLSearchParams(location.hash.slice(1));
  if (hash.get('t')) { localStorage.setItem('cvh_token', hash.get('t')); history.replaceState(null,'',location.pathname); }
  const token = localStorage.getItem('cvh_token') || '';
  const authQS = token ? ('token=' + encodeURIComponent(token)) : '';
  const headers = token ? { Authorization: 'Bearer ' + token } : {};

  const $ = (id) => document.getElementById(id);
  const stateEl = $('state'), sel = $('sessions'), micBtn = $('mic');
  let rec = null, chunks = [], recording = false, lastAudio = null;

  if (!window.isSecureContext) $('secWarn').hidden = false;

  function showErr(m) { const e = $('err'); e.textContent = m; e.hidden = false; setTimeout(() => (e.hidden = true), 6000); }
  function setState(s) { stateEl.textContent = s; stateEl.className = 'pill' + (s === 'working…' ? ' busy' : s === 'ready' ? ' ready' : ''); }

  async function loadSessions() {
    try {
      const r = await fetch(base + '/api/sessions', { headers });
      if (!r.ok) throw new Error('HTTP ' + r.status + (r.status === 401 ? ' — bad/missing token' : ''));
      const { sessions } = await r.json();
      const live = sessions.filter((s) => s.state !== 'dead');
      sel.innerHTML = '';
      if (!live.length) { const o = document.createElement('option'); o.textContent = 'No live sessions — start one on the desktop'; o.disabled = true; sel.appendChild(o); return; }
      for (const s of live) {
        const o = document.createElement('option');
        o.value = s.id;
        o.textContent = (s.label || (s.cwd || '').split(/[\\/]/).pop()) + '  ·  ' + s.state;
        sel.appendChild(o);
      }
    } catch (e) { showErr('Load sessions failed: ' + e.message); }
  }

  async function sendCommand(payloadFactory) {
    const sessionId = sel.value;
    if (!sessionId) { showErr('Pick a session first'); return; }
    setState('working…');
    try {
      const { body, extraHeaders } = payloadFactory(sessionId);
      const r = await fetch(base + '/api/command', { method: 'POST', headers: { ...headers, ...extraHeaders }, body });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || ('HTTP ' + r.status));
      $('result').hidden = false;
      $('transcript').textContent = data.transcript || '';
      $('summary').textContent = data.summary || data.responseText || '';
      setState('ready');
      if (data.audioUrl) {
        lastAudio = base + data.audioUrl + (authQS ? (data.audioUrl.includes('?') ? '&' : '?') + authQS : '');
        $('replay').hidden = false;
        new Audio(lastAudio).play().catch(() => {});
      } else { $('replay').hidden = true; }
    } catch (e) { setState('idle'); showErr(e.message); }
  }

  // typed
  $('send').onclick = () => {
    const t = $('text').value.trim();
    if (!t) return;
    $('text').value = '';
    sendCommand(() => ({ body: JSON.stringify({ sessionId: sel.value, text: t }), extraHeaders: { 'Content-Type': 'application/json' } }));
  };
  $('text').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('send').click(); });

  // voice
  function pickMime() {
    for (const m of ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg']) {
      if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m;
    }
    return '';
  }
  async function startRec() {
    if (!navigator.mediaDevices?.getUserMedia) { showErr('Microphone not available (needs HTTPS)'); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mime = pickMime();
      rec = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
      chunks = [];
      rec.ondataavailable = (e) => e.data.size && chunks.push(e.data);
      rec.onstop = () => {
        stream.getTracks().forEach((t) => t.stop());
        const type = rec.mimeType || 'audio/webm';
        const ext = type.includes('mp4') ? 'mp4' : type.includes('ogg') ? 'ogg' : 'webm';
        const blob = new Blob(chunks, { type });
        sendCommand((sessionId) => { const fd = new FormData(); fd.append('audio', blob, 'clip.' + ext); fd.append('sessionId', sessionId); return { body: fd, extraHeaders: {} }; });
      };
      rec.start();
      recording = true; micBtn.classList.add('rec'); micBtn.textContent = '⏹ Tap to stop';
    } catch (e) { showErr('Mic error: ' + e.message); }
  }
  function stopRec() { if (rec && recording) { recording = false; micBtn.classList.remove('rec'); micBtn.textContent = '🎙️ Tap to talk'; rec.stop(); } }
  micBtn.onclick = () => (recording ? stopRec() : startRec());

  $('replay').onclick = () => { if (lastAudio) new Audio(lastAudio).play().catch(() => {}); };
  $('refresh').onclick = loadSessions;

  loadSessions();
  setInterval(() => { if (!recording && stateEl.textContent !== 'working…') loadSessions(); }, 5000);
})();
</script>
</body>
</html>
